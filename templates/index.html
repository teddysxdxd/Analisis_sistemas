<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Esperanza Agro - Vercel</title>
    <style>
        body { font-family: Arial, sans-serif; background: #eee; margin: 0; display: flex; justify-content: center; }
        .phone { width: 360px; background: #f8f9fa; min-height: 640px; position: relative; border: 1px solid #ccc; }
        .header { background: #fff; padding: 10px; display: flex; justify-content: space-between; align-items: center; }
        .logo-area { text-align: center; width: 100%; }
        .screen { display: none; padding: 20px; }
        .active { display: block; }
        
        /* Estilos del Mockup PDF */
        label { display: block; font-weight: bold; font-size: 13px; margin: 15px 0 5px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #000; box-sizing: border-box; }
        
        .btn-entrar { 
            background: #4facfe; color: white; border: none; padding: 15px; 
            width: 100%; border-radius: 30px; font-weight: bold; font-size: 18px;
            margin-top: 20px; cursor: pointer;
        }
        .btn-publicar { 
            background: #002d5a; color: white; border: none; padding: 15px; 
            width: 100%; font-weight: bold; cursor: pointer; margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="phone">
        <div id="loginScreen" class="screen active">
            <div class="header"><span>Ayuda</span> <span>Salir</span></div>
            <div class="logo-area"><img src="https://cdn-icons-png.flaticon.com/512/1147/1147832.png" width="80"></div>
            <label>TELÉFONO / USUARIO</label>
            <input type="text" id="user">
            <label>CONTRASEÑA</label>
            <input type="password" id="pass">
            <button class="btn-entrar" onclick="entrar()">ENTRAR</button>
            <p style="text-align:center; font-size:12px; text-decoration:underline;">RECUPERAR CONTRASEÑA</p>
        </div>

        <div id="harvestScreen" class="screen">
            <h2 style="font-size:16px; text-align:center;">NUEVA DISPONIBILIDAD</h2>
            <label>PRODUCTO</label>
            <select id="prod"><option>Frijol Negro</option><option>Maíz Amarillo</option></select>
            <label>VARIEDAD (Opcional)</label>
            <input type="text" id="var">
            <label>CANTIDAD</label>
            <input type="number" id="cant" value="50">
            <label>UNIDAD</label>
            <select id="uni"><option>Quintales</option><option>Libras</option></select>
            <label>FECHA DISPONIBLE</label>
            <input type="date" id="fecha">
            <button class="btn-publicar" onclick="publicar()">PUBLICAR EN CATÁLOGO</button>
        </div>
    </div>

    <script>
        function entrar() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(u && p) {
                document.getElementById('loginScreen').classList.remove('active');
                document.getElementById('harvestScreen').classList.add('active');
            } else { alert("Ingresa datos"); }
        }

        function publicar() {
            const data = {
                producto: document.getElementById('prod').value,
                cantidad: document.getElementById('cant').value,
                fecha: document.getElementById('fecha').value
            };
            // Guardar en el teléfono (LocalStorage) ya que Vercel no tiene Disco
            let cosechas = JSON.parse(localStorage.getItem('cosechas') || "[]");
            cosechas.push(data);
            localStorage.setItem('cosechas', JSON.stringify(cosechas));
            
            alert("¡Publicado! Cosechas guardadas en memoria: " + cosechas.length);
            location.reload(); // Regresa al login
        }
    </script>
</body>
</html>
