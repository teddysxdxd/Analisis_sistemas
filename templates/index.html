<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Esperanza Agro - Prototipo</title>
    <style>
        :root { --primary: #0099ff; --secondary: #002d5a; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; padding-top: 20px; }
        .mobile-container { width: 100%; max-width: 360px; background: white; min-height: 640px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; position: relative; }
        .header { background: white; padding: 20px; text-align: center; }
        .logo-img { width: 80px; margin-bottom: 10px; }
        
        /* Pantallas */
        .screen { padding: 20px; display: none; }
        .active { display: block; }

        /* Estilo Inputs tipo Mockup */
        label { display: block; font-weight: bold; font-size: 12px; margin-bottom: 5px; text-transform: uppercase; color: #444; }
        input, select { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #000; border-radius: 4px; box-sizing: border-box; }
        
        /* Botón estilo Mockup */
        .btn-entrar { 
            background: linear-gradient(to right, #4facfe 0%, #00f2fe 100%); 
            color: white; border: none; padding: 15px; width: 100%; 
            border-radius: 30px; font-weight: bold; font-size: 18px; 
            cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .btn-publicar { background: var(--secondary); color: white; border: none; padding: 15px; width: 100%; border-radius: 4px; font-weight: bold; cursor: pointer; }
        
        .nav-links { text-align: center; margin-top: 10px; font-size: 12px; text-decoration: underline; color: #666; }
    </style>
</head>
<body>

<div class="mobile-container">
    <div id="loginScreen" class="screen active">
        <div class="header">
            <img src="https://cdn-icons-png.flaticon.com/512/1147/1147832.png" class="logo-img" alt="maiz">
            <div style="font-weight: bold;">AYUDA | SALIR</div>
        </div>
        <div style="padding: 20px;">
            <label>TELÉFONO / USUARIO</label>
            <input type="text" id="user" placeholder="Ej. 55554433">
            
            <label>CONTRASEÑA</label>
            <input type="password" id="pass" placeholder="********">
            
            <button class="btn-entrar" onclick="showScreen('harvestScreen')">ENTRAR →</button>
            <div class="nav-links">RECUPERAR CONTRASEÑA</div>
        </div>
    </div>

    <div id="harvestScreen" class="screen">
        <h3 style="text-align: center; color: var(--secondary);">NUEVA DISPONIBILIDAD</h3>
        <form id="harvestForm">
            <label>PRODUCTO</label>
            <select id="producto">
                <option value="Frijol Negro">Frijol Negro</option>
                <option value="Maíz Amarillo">Maíz Amarillo</option>
            </select>

            <label>VARIEDAD (Opcional)</label>
            <input type="text" id="variedad" placeholder="Ej. Criollo">

            <label>CANTIDAD</label>
            <input type="number" id="cantidad" value="50">

            <label>UNIDAD</label>
            <select id="unidad">
                <option value="Quintales">Quintales</option>
                <option value="Libras">Libras</option>
            </select>

            <label>FECHA DISPONIBLE</label>
            <input type="date" id="fecha">

            <button type="submit" class="btn-publicar">PUBLICAR EN CATÁLOGO</button>
        </form>
    </div>
</div>

<script>
    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    document.getElementById('harvestForm').onsubmit = async (e) => {
        e.preventDefault();
        const data = {
            producto: document.getElementById('producto').value,
            variedad: document.getElementById('variedad').value,
            cantidad: document.getElementById('cantidad').value,
            unidad: document.getElementById('unidad').value,
            referencia: "Plaza Central" // Dato por defecto
        };

        try {
            const res = await fetch('/api/cosecha', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            if(res.ok) {
                alert("¡Publicado en catálogo exitosamente!");
                showScreen('loginScreen');
            }
        } catch (err) {
            alert("Error al conectar con el servidor");
        }
    };
</script>
</body>
</html>
